<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시니어 피싱 예방 훈련</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      text-align: center;
      background: #e9ecef;
      margin: 0;
      padding: 20px;

      /* ✅ 세로/가로 중앙정렬 */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      box-sizing: border-box;
    }

    #game-container {
      width: 100%;
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }

    .timer-bar {
      width: 100%;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      margin: 20px 0;
      overflow: hidden;
    }

    #timer-fill {
      width: 100%;
      height: 100%;
      background: #28a745;
      transition: width 0.1s linear;
    }

    .word-box-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
    }

    .word-box {
      width: 220px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fa;
      color: #333;
      font-size: 36px;
      font-weight: 800;
      border-radius: 20px;
      cursor: pointer;
      border: 4px solid #007bff;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .word-box:hover { background: #e7f1ff; }
    .word-box:active { transform: scale(0.95); background: #007bff; color: white; }

    h2 { font-size: 32px; color: #333; margin-bottom: 10px; }
    .info-text { font-size: 20px; color: #666; margin-bottom: 10px; }

    /* ✅ 자산 표시 */
    #asset-display {
      font-size: 22px;
      font-weight: 800;
      color: #111;
      margin: 0 0 18px 0;
    }

    /* ✅ 게임 종료 화면 */
    #end-screen {
      display: none;
      margin-top: 30px;
    }

    #restart-btn {
      margin-top: 18px;
      padding: 14px 18px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: #007bff;
      color: #fff;
    }

    #restart-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div id="game-container">
    <h2 id="stage-title">단계: 1 / 30</h2>
    <p id="asset-display">자산: 30,000,000원</p>
    <p class="info-text">진짜 단어를 <b>2초</b> 안에 누르세요!</p>

    <div class="timer-bar"><div id="timer-fill"></div></div>

    <div class="word-box-container" id="play-area">
      <button class="word-box" id="box-0" onclick="checkAnswer(0)"></button>
      <button class="word-box" id="box-1" onclick="checkAnswer(1)"></button>
    </div>

    <div id="end-screen">
      <h2>게임 종료</h2>
      <p class="info-text">자산이 0원이 되어 더 이상 진행할 수 없습니다.</p>
      <button id="restart-btn" onclick="restartGame()">처음부터 다시하기</button>
    </div>
  </div>

  <script>
    // ✅ 단어 30개
    const stages = [
      { c: "한가족", w: "한가죽" }, { c: "우체국", w: "우채국" }, { c: "검찰청", w: "검찰정" },
      { c: "보안카드", w: "보완카드" }, { c: "고객센터", w: "고객센타" }, { c: "국민은행", w: "국민은헹" },
      { c: "안전결제", w: "안전결재" }, { c: "계좌번호", w: "계좌번화" }, { c: "비밀번호", w: "비밀번호1" },
      { c: "긴급재난", w: "긴급재란" }, { c: "본인인증", w: "본인인정" }, { c: "카드발급", w: "카드벌급" },
      { c: "송금확인", w: "승금확인" }, { c: "정부지원", w: "정부지윈" }, { c: "대출상담", w: "대츨상담" },
      { c: "입금완료", w: "임금완료" }, { c: "현금인출", w: "현금인츨" }, { c: "해킹방지", w: "해킹방치" },
      { c: "공인인증", w: "공인인정" }, { c: "금융감독", w: "금융감독원" }, { c: "무료거부", w: "무료거북" },
      { c: "택배배송", w: "택베배송" }, { c: "조회하기", w: "조회하끼" }, { c: "내역확인", w: "내역화긴" },
      { c: "정상접수", w: "정상첩수" }, { c: "신고접수", w: "신고첩수" }, { c: "승인번호", w: "승인번효" },
      { c: "결제취소", w: "결재취소" }, { c: "명의도용", w: "명의도욤" }, { c: "개인정보", w: "개안정보" },
      { c: "저금리", w: "저금니" }
    ];

    let currentStage = 0;
    let timer;
    const LIMIT = 2000;   // ✅ 2초
    let timeLeft = LIMIT;

    // ✅ 자산 시스템 (3천만원, 틀릴 때 -1천만원)
    const INITIAL_ASSET = 30000000;
    const PENALTY = 10000000;
    let asset = INITIAL_ASSET;
    let gameEnded = false;

    function formatWon(n) {
      return n.toLocaleString("ko-KR") + "원";
    }

    function updateAssetUI() {
      document.getElementById("asset-display").innerText = `자산: ${formatWon(asset)}`;
    }

    function setButtonsEnabled(enabled) {
      document.getElementById("box-0").disabled = !enabled;
      document.getElementById("box-1").disabled = !enabled;
    }

    function startGame() {
      if (gameEnded) return;

      if (currentStage >= stages.length) {
        clearInterval(timer);
        alert("완벽합니다! 30단계를 모두 통과하셨습니다.");
        // 완료 후 다시 1단계부터(자산 유지)
        currentStage = 0;
        startGame();
        return;
      }

      document.getElementById("stage-title").innerText = `단계: ${currentStage + 1} / ${stages.length}`;
      const data = stages[currentStage];
      const isLeftCorrect = Math.random() > 0.5;

      const box0 = document.getElementById("box-0");
      const box1 = document.getElementById("box-1");

      box0.innerText = isLeftCorrect ? data.c : data.w;
      box1.innerText = isLeftCorrect ? data.w : data.c;

      box0.dataset.correct = String(isLeftCorrect);
      box1.dataset.correct = String(!isLeftCorrect);

      setButtonsEnabled(true);
      startTimer();
    }

    function startTimer() {
      if (gameEnded) return;

      timeLeft = LIMIT;
      const fill = document.getElementById("timer-fill");
      fill.style.width = "100%";
      clearInterval(timer);

      timer = setInterval(() => {
        timeLeft -= 100;
        fill.style.width = (timeLeft / LIMIT) * 100 + "%";

        if (timeLeft <= 0) {
          clearInterval(timer);
          // ✅ 시간 초과도 패널티
          gameOver("시간 초과! 침착하게 다시 해보세요.");
        }
      }, 100);
    }

    function checkAnswer(side) {
      if (gameEnded) return;

      const isCorrect = document.getElementById(`box-${side}`).dataset.correct === "true";

      if (isCorrect) {
        currentStage++;
        startGame();
      } else {
        gameOver("아이쿠! 가짜 단어에 속으셨네요.");
      }
    }

    // ✅ 틀리면 자산 차감 후 "같은 단계"에서 다시 시작
    function gameOver(msg) {
      if (gameEnded) return;

      clearInterval(timer);

      asset = Math.max(0, asset - PENALTY);
      updateAssetUI();

      if (asset === 0) {
        endGame(msg + "\n자산이 0원이 되어 게임이 종료됩니다.");
        return;
      }

      alert(`${msg}\n(자산 -${formatWon(PENALTY)} / 남은 자산: ${formatWon(asset)})`);

      // ✅ 현재 단계 유지 (currentStage 그대로)
      startGame();
    }

    function endGame(finalMsg) {
      gameEnded = true;
      clearInterval(timer);

      setButtonsEnabled(false);

      document.getElementById("stage-title").innerText = "게임 종료";
      document.getElementById("play-area").style.display = "none";
      document.getElementById("end-screen").style.display = "block";

      alert(finalMsg);
    }

    function restartGame() {
      clearInterval(timer);
      gameEnded = false;
      asset = INITIAL_ASSET;
      currentStage = 0;

      updateAssetUI();
      document.getElementById("play-area").style.display = "flex";
      document.getElementById("end-screen").style.display = "none";

      startGame();
    }

    updateAssetUI();
    startGame();
  </script>
</body>
</html>
