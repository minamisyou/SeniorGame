<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시니어 피싱 예방 게임</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        #game-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .timer-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s linear; }
        .word-box-container { display: flex; justify-content: space-around; gap: 20px; margin-top: 50px; }
        .word-box { width: 180px; height: 120px; display: flex; align-items: center; justify-content: center; 
                    background: #007bff; color: white; font-size: 28px; font-weight: bold; border-radius: 15px; cursor: pointer; border: none; }
        .word-box:active { transform: scale(0.95); }
        h2 { color: #333; }
        #status { margin-top: 20px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <h2 id="stage-title">STAGE 1</h2>
    <p>진짜 단어를 2초 안에 찾으세요!</p>
    
    <div class="timer-bar"><div id="timer-fill"></div></div>

    <div class="word-box-container">
        <button class="word-box" id="left-box" onclick="checkAnswer(0)"></button>
        <button class="word-box" id="right-box" onclick="checkAnswer(1)"></button>
    </div>

    <div id="status"></div>
</div>

<script>
    const stages = [
        { correct: "한가족", wrong: "한가죽" },
        { correct: "우체국", wrong: "우채국" },
        { correct: "안전결제", wrong: "안전결제 " },
        { correct: "보안카드", wrong: "보완카드" },
        { correct: "검찰청", wrong: "검찰정" },
        { correct: "긴급재난", wrong: "긴급재란" },
        { correct: "본인인정", wrong: "본인인증 " },
        { correct: "카드발급", wrong: "카드벌급" },
        { correct: "송금확인", wrong: "송금획인 " },
        { correct: "고객센터", wrong: "고객센뚜" }
    ];

    let currentStage = 0;
    let timer;
    let timeLeft = 2000;

    function startGame() {
        if (currentStage >= stages.length) {
            document.getElementById('game-container').innerHTML = "<h1>축하합니다!</h1><p>모든 피싱 위협을 막아냈습니다!</p>";
            return;
        }
        
        document.getElementById('stage-title').innerText = `STAGE ${currentStage + 1}`;
        const data = stages[currentStage];
        const isLeftCorrect = Math.random() > 0.5;
        
        const leftBox = document.getElementById('left-box');
        const rightBox = document.getElementById('right-box');

        leftBox.innerText = isLeftCorrect ? data.correct : data.wrong;
        rightBox.innerText = isLeftCorrect ? data.wrong : data.correct;
        leftBox.dataset.correct = isLeftCorrect;
        rightBox.dataset.correct = !isLeftCorrect;

        startTimer();
    }

    function startTimer() {
        timeLeft = 2000;
        const fill = document.getElementById('timer-fill');
        clearInterval(timer);
        
        timer = setInterval(() => {
            timeLeft -= 100;
            fill.style.width = (timeLeft / 2000) * 100 + "%";
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                gameOver("시간 초과! 더 빨리 확인하세요.");
            }
        }, 100);
    }

    function checkAnswer(side) {
        const isCorrect = (side === 0) ? 
            document.getElementById('left-box').dataset.correct === "true" : 
            document.getElementById('right-box').dataset.correct === "true";

        if (isCorrect) {
            currentStage++;
            startGame();
        } else {
            gameOver("오답입니다! 피싱에 주의하세요.");
        }
    }

    function gameOver(msg) {
        alert(msg);
        currentStage = 0;
        startGame();
    }

    startGame();
</script>
</body>
</html>
