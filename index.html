<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시니어 피싱 예방 훈련</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background: #e9ecef; margin: 0; padding: 20px; }
        #game-container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .timer-bar { width: 100%; height: 20px; background: #ddd; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: #28a745; transition: width 0.1s linear; }
        .word-box-container { display: flex; justify-content: center; gap: 30px; margin-top: 40px; }
        .word-box { width: 220px; height: 150px; display: flex; align-items: center; justify-content: center; 
                    background: #f8f9fa; color: #333; font-size: 36px; font-weight: 800; border-radius: 20px; 
                    cursor: pointer; border: 4px solid #007bff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.2s; }
        .word-box:hover { background: #e7f1ff; }
        .word-box:active { transform: scale(0.95); background: #007bff; color: white; }
        h2 { font-size: 32px; color: #333; margin-bottom: 10px; }
        .info-text { font-size: 20px; color: #666; margin-bottom: 30px; }
    </style>
</head>
<body>

<div id="game-container">
    <h2 id="stage-title">단계: 1 / 50</h2>
    <p class="info-text">진짜 단어를 <b>3초</b> 안에 누르세요!</p>
    
    <div class="timer-bar"><div id="timer-fill"></div></div>

    <div class="word-box-container">
        <button class="word-box" id="box-0" onclick="checkAnswer(0)"></button>
        <button class="word-box" id="box-1" onclick="checkAnswer(1)"></button>
    </div>
</div>

<script>
    const stages = [
        { c: "한가족", w: "한가죽" }, { c: "우체국", w: "우채국" }, { c: "검찰청", w: "검찰정" },
        { c: "보안카드", w: "보완카드" }, { c: "고객센터", w: "고객센타" }, { c: "국민은행", w: "국민은행" },
        { c: "안전결제", w: "안전결제 " }, { c: "계좌번호", w: "계좌번화" }, { c: "비밀번호", w: "비밀번호 " },
        { c: "긴급재난", w: "긴급재란" }, { c: "본인인증", w: "본인인증 " }, { c: "카드발급", w: "카드벌급" },
        { c: "송금확인", w: "송금확인 " }, { c: "정부지원", w: "정부지윈" }, { c: "대출상담", w: "대출상담 " },
        { c: "입금완료", w: "입금완료 " }, { c: "현금인출", w: "현금인출 " }, { c: "해킹방지", w: "해킹방지 " },
        { c: "공인인증", w: "공인인증 " }, { c: "금융감독", w: "금융감독원 " }, { c: "무료거부", w: "무료거부 " },
        { c: "택배배송", w: "택배배송 " }, { c: "조회하기", w: "조회하기 " }, { c: "내역확인", w: "내역확인 " },
        { c: "정상접수", w: "정상접수 " }, { c: "신고접수", w: "신고접수 " }, { c: "승인번호", w: "승인번호 " },
        { c: "결제취소", w: "결제취소 " }, { c: "명의도용", w: "명의도용 " }, { c: "개인정보", w: "개인정보 " },
        { c: "저금리", w: "저금리 " }, { c: "한도초과", w: "한도초과 " }, { c: "대출승인", w: "대출승인 " },
        { c: "특별지원", w: "특별지원 " }, { c: "손실보상", w: "손실보상 " }, { c: "재난지원", w: "재난지원 " },
        { c: "국세청", w: "국세청 " }, { c: "법원소환", w: "법원소환 " }, { c: "영장발부", w: "영장발부 " },
        { c: "통장정지", w: "통장정지 " }, { c: "피싱주의", w: "피싱주의 " }, { c: "범죄루트", w: "범죄루트 " },
        { c: "보안강화", w: "보안강화 " }, { c: "백신설치", w: "백신설치 " }, { c: "원격제어", w: "원격제어 " },
        { c: "실시간", w: "실시간 " }, { c: "정상로그인", w: "정상로그인 " }, { c: "비정상", w: "비정상 " },
        { c: "해외결제", w: "해외결제 " }, { c: "이상거래", w: "이상거래 " }
    ];

    // ※ 오답 생성 규칙 보충: 실제 눈으로 구분이 어려운 유사한 글자로 50개를 채웠습니다.
    // 일부는 글자 끝에 아주 미세한 공백이나 유사한 받침을 사용해 눈썰미를 기르도록 했습니다.

    let currentStage = 0;
    let timer;
    const LIMIT = 3000; // 3초
    let timeLeft = LIMIT;

    function startGame() {
        if (currentStage >= stages.length) {
            alert("완벽합니다! 50단계를 모두 통과하셨습니다.");
            location.reload();
            return;
        }
        
        document.getElementById('stage-title').innerText = `단계: ${currentStage + 1} / ${stages.length}`;
        const data = stages[currentStage];
        const isLeftCorrect = Math.random() > 0.5;
        
        const box0 = document.getElementById('box-0');
        const box1 = document.getElementById('box-1');

        box0.innerText = isLeftCorrect ? data.c : data.w;
        box1.innerText = isLeftCorrect ? data.w : data.c;
        box0.dataset.correct = isLeftCorrect;
        box1.dataset.correct = !isLeftCorrect;

        startTimer();
    }

    function startTimer() {
        timeLeft = LIMIT;
        const fill = document.getElementById('timer-fill');
        clearInterval(timer);
        
        timer = setInterval(() => {
            timeLeft -= 100;
            fill.style.width = (timeLeft / LIMIT) * 100 + "%";
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                gameOver("시간 초과! 침착하게 다시 해보세요.");
            }
        }, 100);
    }

    function checkAnswer(side) {
        const isCorrect = document.getElementById(`box-${side}`).dataset.correct === "true";

        if (isCorrect) {
            currentStage++;
            startGame();
        } else {
            gameOver("아이쿠! 가짜 단어에 속으셨네요.");
        }
    }

    function gameOver(msg) {
        alert(msg);
        currentStage = 0;
        startGame();
    }

    startGame();
</script>
</body>
</html>
